name: Destroy AWS EC2

on:
  workflow_dispatch:   # manual trigger only — Actions → Destroy AWS EC2 → Run workflow

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: production   # requires manual approval before destroying

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: opentofu/setup-opentofu@v1

      - name: tofu init
        run: tofu -chdir=terraform init

      - name: tofu destroy
        run: tofu -chdir=terraform destroy -auto-approve
        env:
          TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
