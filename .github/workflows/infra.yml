name: Provision AWS EC2

on:
  push:
    branches: [main]
    paths: ['terraform/**']
  pull_request:
    paths: ['terraform/**']

permissions:
  id-token: write        # required for OIDC
  contents: read
  pull-requests: write   # required to post plan as PR comment

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: opentofu/setup-opentofu@v1

      - name: tofu init
        run: tofu -chdir=terraform init

      - name: tofu plan
        run: tofu -chdir=terraform plan -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### OpenTofu Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  apply:
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # optional: adds a manual approval gate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: opentofu/setup-opentofu@v1

      - name: tofu init
        run: tofu -chdir=terraform init

      - name: tofu apply
        run: tofu -chdir=terraform apply -auto-approve
        env:
          TF_VAR_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Export EC2 IP
        run: tofu -chdir=terraform output -raw instance_public_ip > ec2_ip.txt

      - name: Upload EC2 IP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ec2-ip
          path: ec2_ip.txt
          retention-days: 1
